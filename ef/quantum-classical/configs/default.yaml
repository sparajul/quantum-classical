# ─────────────────────────────────────────────────────────────────────────────
# Quantum-Classical Hybrid GNN — Default Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Paths ─────────────────────────────────────────────────────────────────────
input_dir:  "data/graphs"
stage_dir:  "outputs/"

# ── Hardware ──────────────────────────────────────────────────────────────────
accelerator: "auto"
devices:     1
num_workers: [8, 8, 8]

# ── WandB ─────────────────────────────────────────────────────────────────────
wandb_project: "ICHEP_2026"
wandb_entity:  null
wandb_tags:    ["quantum-gnn", "particle-tracking", "atlas", "hl-lhc"]

# ── Dataset ───────────────────────────────────────────────────────────────────
batch_size:       1
data_split:       [800, 100, 100]
remove_electrons: false
pt_cut:           1.      # hard pt threshold in GeV; null = disabled

# ── Per-edge loss weighting ───────────────────────────────────────────────────
weighting:
  - weight: 1.0
    conditions:
      y: True
      pt: [1., .inf]
      nhits: [3, .inf]

# ── Graph features ────────────────────────────────────────────────────────────
node_features: [r, phi, z, eta]
node_scales:   [1000., 3.14159265359, 1000., 1.]
edge_features: [dr, dphi, dz, deta]

# ── Model ─────────────────────────────────────────────────────────────────────
model_type: "classical"    # "quantum" | "classical"

# ── Quantum circuit (model_type=quantum only) ─────────────────────────────────
n_qubits:          4
n_qlayers:         1
data_reuploading:  false   # re-encode input before each variational layer
ring_entanglement: false   # add CNOT(n-1→0) to close the entanglement ring

# ── Network architecture ──────────────────────────────────────────────────────
hidden:                  16
n_graph_iters:           4
n_node_encoder_layers:   1
n_edge_encoder_layers:   1
n_node_net_layers:       1
n_edge_net_layers:       1
n_edge_decoder_layers:   1

# ── Normalisation & activations ───────────────────────────────────────────────
layernorm:         false
batchnorm:         true
hidden_activation: "ReLU"
output_activation: null

# ── Message passing ───────────────────────────────────────────────────────────
concat:                     true
node_net_recurrent:         true
edge_net_recurrent:         true
in_out_diff_agg:            true
checkpointing:              false
undirected_message_passing: true

# ── Training ──────────────────────────────────────────────────────────────────
lr:                0.0005
min_lr:            0.00005
weight_decay:      0.0
warmup:            5
patience:          50
max_epochs:        100
edge_cut:          0.5
gradient_clip_val: 1.0
pos_weight:        15
