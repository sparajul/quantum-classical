name: qgnn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # PyTorch, torch-geometric, and torch-scatter are installed by install.sh
    # because they require CUDA-specific wheel URLs detected at install time.
    - pyarrow>=14.0.0
    - pytorch-lightning>=2.0.0
    - pennylane>=0.35.0
    - pennylane-lightning>=0.35.0
    - pennylane-qiskit>=0.35.0
    - qiskit>=1.0.0
    - qiskit-aer>=0.14.0
    - qiskit-ibm-runtime>=0.20.0
    - scikit-learn>=1.3.0
    - numpy>=1.24.0
    - wandb>=0.16.0
    - tensorboard>=2.14.0
    - pyyaml>=6.0
    - rich>=13.0.0
